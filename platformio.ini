; PlatformIO Project Configuration
;
; r2common — shared C++ utility library
; This is a library-only project. The src/ dir contains a minimal
; placeholder; all library code lives under lib/r2common/.

[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino

[env:native]
platform = native
build_flags =
    -std=c++17
    -lcurl
build_src_filter =
    +<*>
lib_deps =
lib_compat_mode = off
